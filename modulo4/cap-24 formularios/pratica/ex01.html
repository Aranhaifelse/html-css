<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>login</h1>
    <form action="login.js" method="post">
        <p>
            <label for="inome">Nome: </label>
            <input type="text" name="nome" name="inome" minlength="10" autocomplete="name" placeholder="Nome completo" required>
        </p>

        <p>
            <label for="isen">Senha: </label>
            <input type="password" name="sen" id="isen">
        </p>

    </form>
</body>
</html>
